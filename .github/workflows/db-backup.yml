name: Daily DB backup

on:
  # Daily at 02:00 UTC. Adjust to your timezone — Bucharest is UTC+2/+3, so
  # 02:00 UTC = 04:00–05:00 local. Plenty quiet hour, no production traffic.
  schedule:
    - cron: '0 2 * * *'
  # Manual trigger from the Actions tab — useful before risky migrations.
  workflow_dispatch:

# Permissions: needs contents:write to commit the backup back into the repo.
permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Dump database (schema + data)
        env:
          # Set this secret in your GitHub repo:
          # Settings → Secrets and variables → Actions → New repository secret
          # Name: SUPABASE_DB_URL
          # Value: direct connection string from Supabase dashboard
          #        Click "Connect" in the top header → "Direct connection" → URI
          #        Format: postgresql://postgres:[PASSWORD]@db.[PROJECT_REF].supabase.co:5432/postgres
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          mkdir -p backups
          DATE=$(date -u +%Y-%m-%d)
          OUT="backups/bundy-${DATE}.sql"
          # supabase db dump defaults to schema-only. We do two passes (schema
          # then data) and concatenate so the resulting file is a complete,
          # restorable snapshot.
          supabase db dump --db-url "$DB_URL" -f /tmp/schema.sql
          supabase db dump --db-url "$DB_URL" --data-only -f /tmp/data.sql
          cat /tmp/schema.sql /tmp/data.sql > "$OUT"
          rm -f /tmp/schema.sql /tmp/data.sql
          gzip -f "$OUT"
          echo "Wrote ${OUT}.gz ($(du -h "${OUT}.gz" | cut -f1))"

      - name: Prune old backups (keep last 30 days)
        run: |
          # Delete files older than 30 days. Adjust as needed.
          find backups -type f -name 'bundy-*.sql.gz' -mtime +30 -delete || true

      - name: Commit + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backups/
          # Skip if nothing changed (no commit, no push, exit cleanly).
          if git diff --staged --quiet; then
            echo "No backup changes to commit."
            exit 0
          fi
          git commit -m "DB backup $(date -u +%Y-%m-%d)"
          git push
