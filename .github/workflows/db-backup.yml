name: Daily DB backup

# Daily Postgres dump pushed to a SEPARATE private repo (BACKUP_REPO).
# We never commit backups to the main bundy repo because that one is public —
# dumps include auth.users (emails, password hashes), refresh tokens, IPs, and
# all user financial data, none of which should be browsable on github.com.
#
# Required GitHub Secrets on the bundy repo:
#   SUPABASE_DB_URL  — direct Postgres connection string from Supabase dashboard
#   BACKUP_REPO      — owner/name of the private backup repo (e.g. andreiteodorescu/bundy-backups)
#   BACKUP_REPO_TOKEN — fine-grained PAT with contents:write on the BACKUP_REPO

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the backup repo (private)
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.BACKUP_REPO }}
          token: ${{ secrets.BACKUP_REPO_TOKEN }}
          path: backup-repo

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Dump database (schema + data)
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          mkdir -p backup-repo/backups
          DATE=$(date -u +%Y-%m-%d)
          OUT="backup-repo/backups/bundy-${DATE}.sql"
          # Two-pass: schema then data → concat = full restorable dump.
          supabase db dump --db-url "$DB_URL" -f /tmp/schema.sql
          supabase db dump --db-url "$DB_URL" --data-only -f /tmp/data.sql
          cat /tmp/schema.sql /tmp/data.sql > "$OUT"
          rm -f /tmp/schema.sql /tmp/data.sql
          gzip -f "$OUT"
          echo "Wrote ${OUT}.gz ($(du -h "${OUT}.gz" | cut -f1))"

      - name: Prune backups older than 30 days
        run: |
          find backup-repo/backups -type f -name 'bundy-*.sql.gz' -mtime +30 -delete || true

      - name: Commit + push to backup repo
        working-directory: backup-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --staged --quiet; then
            echo "No backup changes to commit."
            exit 0
          fi
          git commit -m "DB backup $(date -u +%Y-%m-%d)"
          git push
